    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创作人格量表</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
            background-color: #000;
            color: #e0e0e0;
            line-height: 1.7;
        }

        /* ===== HEADER ===== */
        .header {
            background: #000;
            padding: 80px 20px 50px;
            text-align: center;
        }

        .logo {
            display: block;
            margin-bottom: 24px;
            user-select: none;
        }

        .logo-zh { font-size: 80px; font-weight: 900; color: #fff; letter-spacing: 2px; line-height: 1; }
        .logo-box {
            display: inline-flex; align-items: center; justify-content: center;
            background: #F5A623; border-radius: 14px; padding: 6px 18px; margin-left: -2px;
            line-height: 1;
        }
        .logo-box span { font-size: 80px; font-weight: 900; color: #000; letter-spacing: 2px; }

        .logo-en {
            font-size: 18px; font-weight: 700; color: #666; letter-spacing: 6px;
            text-transform: uppercase; margin-bottom: 30px;
        }

        .credits {
            max-width: 640px; margin: 0 auto; font-size: 0.85em; color: #777;
            line-height: 1.9;
        }

        /* ===== PROGRESS ===== */
        .progress-track {
            position: fixed; top: 0; left: 0; width: 100%; height: 4px;
            background: #111; z-index: 999;
        }
        .progress-fill {
            height: 100%; width: 0%; background: #F5A623;
            transition: width .35s ease;
        }
        .progress-count {
            position: fixed; top: 10px; right: 16px; font-size: 12px;
            color: #F5A623; background: rgba(0,0,0,.8); padding: 3px 10px;
            border-radius: 10px; z-index: 999; font-weight: 600;
            display: none;
        }

        /* ===== CONTAINER ===== */
        .container { max-width: 860px; margin: 0 auto; padding: 0 20px 60px; }

        /* ===== INTRO ===== */
        .intro {
            background: #111; border-left: 4px solid #F5A623;
            padding: 28px 30px; border-radius: 0 8px 8px 0; margin-bottom: 40px;
        }
        .intro h2 { color: #F5A623; margin-bottom: 14px; font-size: 1.2em; }
        .intro p { margin-bottom: 10px; color: #bbb; font-size: 0.95em; }
        .intro strong { color: #F5A623; }

        /* ===== QUESTIONS ===== */
        .question {
            background: #111; padding: 24px 28px; margin-bottom: 16px;
            border-radius: 8px; border: 1px solid #222;
            transition: border-color .3s;
        }
        .question:hover { border-color: #F5A623; }
        .question.answered { border-color: #333; }
        .question.unanswered-highlight { border-color: #c33 !important; }

        .q-text { font-size: 1.02em; margin-bottom: 18px; color: #ddd; line-height: 1.8; }
        .q-num { color: #F5A623; font-weight: 700; margin-right: 8px; }

        .options { display: flex; gap: 8px; }
        .opt { flex: 1; }
        .opt input { display: none; }
        .opt label {
            display: block; text-align: center; padding: 12px 4px;
            background: #1a1a1a; border: 2px solid #333; border-radius: 6px;
            cursor: pointer; transition: all .25s; font-size: 0.82em;
            color: #999; line-height: 1.4;
        }
        .opt label:hover { border-color: #F5A623; color: #fff; }
        .opt input:checked + label {
            background: #F5A623; border-color: #F5A623; color: #000; font-weight: 700;
        }

        /* ===== SUBMIT ===== */
        .submit-wrap { text-align: center; margin: 44px 0; }
        .submit-btn {
            background: #F5A623; color: #000; border: none; padding: 16px 56px;
            font-size: 1.15em; font-weight: 700; border-radius: 8px; cursor: pointer;
            letter-spacing: 2px; transition: all .3s;
        }
        .submit-btn:hover {
            background: #ffb84d; transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(245,166,35,.35);
        }

        .error-msg {
            display: none; background: #c33; color: #fff; padding: 14px;
            border-radius: 6px; margin-bottom: 20px; text-align: center; font-weight: 600;
        }

        /* ===== RESULTS ===== */
        .results { display: none; padding-top: 20px; }
        .results h2 { color: #F5A623; font-size: 1.8em; text-align: center; margin-bottom: 8px; letter-spacing: 3px; }
        .results-subtitle { text-align: center; color: #666; margin-bottom: 30px; font-size: .9em; }

        .summary-box {
            background: #111; border: 2px solid #F5A623; border-radius: 10px;
            padding: 24px; text-align: center; margin-bottom: 40px;
            font-size: 1.15em; color: #F5A623; font-weight: 700;
            letter-spacing: 1px; line-height: 1.9;
        }

        .dim-block {
            background: #0d0d0d; border: 1px solid #222; border-radius: 8px;
            padding: 28px; margin-bottom: 30px;
        }
        .dim-block h3 { color: #F5A623; font-size: 1.3em; margin-bottom: 4px; }
        .dim-axis { color: #666; font-size: .85em; font-style: italic; margin-bottom: 18px; }

        .bar-row { margin-bottom: 12px; }
        .bar-head { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: .9em; }
        .bar-name { color: #bbb; }
        .bar-val { color: #F5A623; font-weight: 700; }
        .bar-track { background: #1a1a1a; height: 20px; border-radius: 4px; border: 1px solid #2a2a2a; overflow: hidden; }
        .bar-fill-anim {
            height: 100%; border-radius: 3px;
            background: linear-gradient(90deg, #F5A623, #ffcc66);
            transition: width 1.2s ease; width: 0%;
        }
        .bar-fill-anim.sub { background: linear-gradient(90deg, #b87a15, #d49a30); }

        .interp {
            margin-top: 20px; padding: 22px; background: #111;
            border-left: 4px solid #F5A623; border-radius: 0 6px 6px 0;
            line-height: 2; color: #bbb; font-size: .93em;
        }
        .interp p { margin-bottom: 14px; }
        .interp p:last-child { margin-bottom: 0; }

        .footer { text-align: center; padding: 40px 20px; color: #444; font-size: .8em; }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            .header { padding: 50px 16px 36px; }
            .logo img { max-width: 90%; }
            .options { gap: 4px; }
            .opt label { padding: 10px 2px; font-size: .72em; }
            .question { padding: 18px 16px; }
            .container { padding: 0 12px 40px; }
            .dim-block { padding: 20px 16px; }
            .summary-box { font-size: 1em; padding: 18px 14px; }
        }
    </style>
</head>

const INTERP = {
"姿态":{
"高姿态":`<p>你的创作意识倾向于占据一个认识论上的优越位置。你可能已经看清了某些事物，作品是这种知晓的传达。这种姿态并不等同于傲慢或说教：它可以表现为先知式的宣称（如威廉·布莱克的预言诗），可以表现为教谕者在完成自身理解后将认识传递给受众的冷静（如贝托尔特·布莱希特的教育剧），也可以表现为批判者对系统性不义的俯瞰与揭示（如乔治·奥威尔的政治小说）。</p>
<p>高姿态的核心结构特征是：你与隐含受众之间存在着认知的不对称，而你始终处于不对称的高端。你的作品所提出的问题往往是你已经持有答案或至少持有强烈倾向的。需要注意的是，高姿态并不排斥深度和复杂性，许多被广泛认可的重要作品正是在这个位置上完成的。它的潜在局限在于，过强的确定性有时会封闭作品的呼吸空间，使受众成为接收者而非参与者。</p>
<p>在摇滚创作中，罗杰·沃特斯（Pink Floyd）在《The Wall》和《Animals》时期是典型的高姿态创作者，他认为自己已诊断出了社会的病灶，而专辑是对这一诊断的展示。鲍勃·迪伦在六十年代初的抗议民谣阶段同样如此，在《Blowin' in the Wind》和《The Times They Are a-Changin'》中存在着一个已识破时代精神的声音在向受众宣告。</p>`,

"低姿态":`<p>你的创作意识倾向于放弃认识论上的优越地位。在你的作品中，确定性是匮乏的，或者是被你主动放弃了的。这并不意味着你的作品缺乏力量。恰恰相反，这种姿态所触及的往往是那些确定性无力覆盖的区域。</p>
<p>低姿态的核心特征是：你与隐含受众之间的认知不对称被消除或反转。你不宣称自己明白受众不知道的东西；你的困惑、矛盾和脆弱是创作的真实出发点而非修辞策略。它的潜在局限在于：过度的不确定性有时可能使作品难以凝聚成足够清晰的力量。</p>
<p>这种低姿态有多种面貌。例如：依巴赫金的分析，陀思妥耶夫斯基的长篇小说从不站在作者的全知位置裁断人物的命运，而是让对立的声音在平等的对话中碰撞；西尔维亚·普拉斯的自白诗倾向于直接暴露自己的脆弱与撕裂的一面，而非从痊愈后的视角出发去回顾苦难。</p>
<p>在摇滚创作中，皮特·汤森（The Who）始终把自己放在困惑者的位置上，他最具野心的两部作品《Tommy》和《Quadrophenia》都选择从被困在系统内部的个体出发，几乎从未站到系统之外去俯瞰它。《OK Computer》至《Kid A》时期的汤姆·约克（Radiohead）也常常以这种姿态创作，他流露出作为个体的恐惧和困惑，但并不居高临下地提供某个确定的诊断。值得一提的是，这些作品的批判力量恰恰来自这种诚实的不确定性。</p>`,

"中间姿态":`<p>你的创作在高姿态与低姿态间保持相对均衡，可能在不同作品或同一作品的不同段落中切换位置。有时你给出确定性的判断和揭示，像一个认知完备的人在传达所想；有时，你又暴露自己的困惑和不确定，倾向于和受众一起面对尚未解决的问题。</p>
<p>这种均衡可能源自你的创作素材本身的多样性，对某些主题你确实持有更强的认知确定性，而对另一些主题你仍在探索之中。也可能源于一种自觉或不自觉的策略，因为你意识到过强的确定性会封闭作品的空间，而过强的不确定性又可能使作品失去方向感。这种位置的优势在于灵活性。你可以根据素材的需要在引导与陪伴之间移动，而不被单一的姿态所限定。</p>
<p>在摇滚创作中，大卫·鲍伊便是这种位置的一个参照，在不同时期和不同作品中，他既有高姿态的宣言式表达（如《"Heroes"》中的某些时刻），也有低姿态的困惑与自我暴露（如晚期的《Blackstar》）。尼尔·杨的创作也常在两端之间移动，时而是直言不讳的立场表达，时而则是充满犹疑的内心独白。罗伯特·弗里普（King Crimson）《Red》中的表现也可以理解为一种中间姿态：作品并不提供对世界的明确解释或结论，但其高度控制的结构与情绪推进又显示出作者并非处于单纯的困惑之中。</p>`
},

"心理年龄":{
"社会化（成人）":`<p>你的创作意识倾向于处于社会化的阶段。在创作之中，你通常能意识到自身经验是有限的，承认自我与他人、个体与社会之间存在不可调和的矛盾与无法克服的鸿沟。这种知晓为你的创作赋予了思维的纵深，也可能带来如此强的疲惫或幻灭，为你的创作蒙上一层感伤的色彩。</p>
<p>创作意识的社会化意味着你的创作具备更强的反思性。在你的创作中，创作意识往往能够从经验中抽身，加以自我审视。一名完成社会化的成人通常具备比较稳定的世界观，能够意识到自身经验的局限，社会化的创作意识也是如此。这种社会化可能表现为强调人际关系的边界，展示庞大体系中个体的挣扎或随波逐流，以及偶然行为导向的必然结果。例如，契诃夫的作品可以被认为是成人化的。《万尼亚舅舅》中，每个人被困在自己的有限经验里，而生活仍要持续；《睡意朦胧》中，主角的境遇决定了她必然犯下的罪行，而她无法违抗自己所处的生活环境。</p>
<p>在摇滚创作中，马克·诺弗勒占据了一个成人化的位置。他的独唱生涯中贯穿着为他人立传的意识，反思个体在历史洪流中的渺小。在《One Deep River》中，他创作了《This One's Not Going to End Well》，将视角投向了奴隶贩子船上的旁观者，描述他们眼睁睁看着邪恶与痛苦在自己周围蔓延，发出"无人善终"的空虚慨叹。正因如此，马克·诺弗勒的音乐总向听众表现出一种悲悯的情怀，伴随着几乎如梦似幻的厌世感。</p>
<p>需要指出，成人化并不排斥使用梦境逻辑或非线性结构。弗朗兹·卡夫卡的荒诞因果律、保罗·策兰的碎裂语言等都是从成人化意识出发，选择了这些形式作为更充分的表达工具。关键的区分不在于表面的形式特征，而是意识是否具备从自身经验中抽身审视的反思性。</p>`,

"前社会化（孩童）":`<p>你的创作意识栖居在前社会化的层次。自我与世界的边界是模糊的、可渗透的，万物可以被自然地赋予灵性或生命力，时间不必是线性的，因果律也不是组织内容的首要原则。这赋予了你的作品一种前逻辑的、充满原初想象力的质地。事物可以不经解释地变形、融合、互相渗透，而这种自由不是策略性地争取来的。它是创作意识本身的位置所允许的。</p>
<p>前社会化意识的力量在于它能触及理性逻辑所无法抵达的区域，看见那些在这种边界尚未固化前才可见的事物。它的潜在局限则在于可能难以处理那些需要充分的因果理解，深刻反思，以及和对他者独立性的承认才能触及的主题。</p>
<p>在视觉艺术中，宫崎骏的动画电影，如《龙猫》《千与千寻》等是典型的例子，从前社会化的意识出发，构建出一个万物有灵的世界。在文学中，这种意识有时出现在以儿童视角叙事的作品中，但需要区分的是：以儿童视角叙事的作品不一定是前社会化的，关键在于作品的整体意识，而非仅仅是「叙事者」所栖居的层次。</p>
<p>在摇滚创作中，希德·巴瑞特（Pink Floyd）在《The Piper at the Gates of Dawn》中的词曲就是前社会化意识的经典呈现：歌词中的世界是万物有灵的、非线性的、拒绝因果律格式化的。约翰·列侬（The Beatles）在《I Am the Walrus》时期同样呈现出这种品质，即语词间的关联遵循某种前逻辑的想象力而非概念。</p>`,

"反社会化（青春期）":`<p>你的创作意识处于对社会化的激烈对抗之中。你看到了社会规范、权威和体制的存在，而你的回应是反叛。未经调节的强烈情感、非此即彼的道德判断、自我中心但同时极度渴望被理解的矛盾心理，通常伴随着对正在丧失的「纯真」或「本真」的执念——这些构成了你创作中的基本动力。</p>
<p>需要特别说明的是，青春期意识不是一个负面判断。这种意识所拥有的强度、锐利和不妥协，恰恰是某些创作行为和意识表达的必要条件：某些东西只能在这种激烈的状态中被说出。它确实也有自身的盲区，例如：未经反思的强烈情感可能使作品难以触及那些需要耐心、距离和对复杂性的承受才能揭露的区域；而非此即彼的道德观可能忽略事物中重要的灰色地带。</p>
<p>在文学中，阿蒂尔·兰波的《彩画集》和J·D·塞林格的《麦田里的守望者》是这种意识的典型代表。在摇滚创作中，性手枪乐队（Sex Pistols）和早期的朋克运动几乎完全诠释了这一位置的定义，其张扬地表达了对现存秩序的否定、拒绝被收编的姿态、以及不加修饰的强烈愤怒。科特·柯本（Nirvana）的创作（如《In Utero》）也带有强烈的青春期意识，歌词中处处流露出对虚伪的厌恶、对纯真丧失的痛苦、以及拒绝妥协但又无处可去的撕裂感。帕蒂·史密斯的早期作品（如《Horses》）则展现了青春期意识中更为灼热的一面，更多地指向艺术形式本身的陈词滥调。</p>`
},

"认知模式":{
"思维":`<p>你的创作意识的首要质料是概念和命题。你创作时，通常倾向从一个想法、一个智识上的问题或一个你希望深入探索的命题出发，作品是这个想法的具现化。你的作品核心特征是较高的可翻译性：如果有人要求你用一组论点或一个概念结构来概括核心内容，转述过程虽然会改变艺术形式的独特性，但不会丧失作品的核心信息。</p>
<p>思维型创作触及的是那些需要清晰的概念骨架才能被把握的复杂结构。它的潜在局限在于：过度依赖概念有时会使作品丧失那些只有在概念之下的感受层面才能被触及的微妙。</p>
<p>思维型创作的力量在于概念的清晰性和结构的精确性，但这与审美品质并不矛盾，不意味着你的作品就是干燥的或缺乏美感的。博尔赫斯是典型的思维型作者。他的许多小说，如《永生》《环形废墟》等都是将哲学概念小说化的尝试，同时也极其精美，其运作方式本身就构成了一种审美品质。</p>
<p>在摇滚创作中，罗杰·沃特斯（Pink Floyd）是高度思维型的：《The Wall》《Animals》和《The Dark Side of the Moon》这些由沃特斯主导的概念专辑都从清晰的概念结构出发，揭示教育体制的压迫、社会阶层的专制结构、现代生活的异化压力等，它们的核心论点可以被概括为一段散文而不丧失太多信息。电台司令乐队（Radiohead）在《OK Computer》和《Hail to the Thief》等时期也具有强烈的思维型特征，不过就专辑总体给人的印象而言，音乐的质感可能比概念更丰富。</p>`,

"感觉":`<p>你的创作意识的首要质料是直接的情感或感官经验。你通常从一种情绪状态、一种身体感受、一种光线或色彩的印象出发，作品是这种经验的直接传达。感觉型作品的核心特征是低度的可翻译性：主题可以被概括，但概括会扭曲作品本身，与作品真正给予受众的感受之间存在巨大的鸿沟。例如，莫奈的《睡莲》可以被概括为「池塘中的睡莲」，但这个概括与人们在画前实际体验到的感受之间的差异过大，几乎无法弥合。表现主义画家马克·罗斯科的色域绘画则将这种特质推向了极端，其标志性作品中的「色块」，实质内容几乎不可能被转述为概念。</p>
<p>感觉型创作触及的是只有在直接感受中才可见的那些微妙领域，例如概念所不能覆盖的颤动、温度和情绪等。它的潜在局限在于可能难以处理那些需要概念骨架才能被充分把握的复杂结构性问题。</p>
<p>在摇滚和音乐创作中，慢潜乐队（Slowdive）和我的血色情人节乐队（My Bloody Valentine）所代表的盯鞋（Shoegaze）流派就是感觉型创作的集中体现，它们构造音墙的目的更多是将听者整个人浸泡在一种感官状态中，而非要传达某些清晰的概念。迷星乐队（Mazzy Star）同样代表了高度感觉型的创作：歌词和声音直接营造了弥散的情绪氛围，而不停留在某个可以被提取的论点上。</p>`,

"幻觉":`<p>你的创作意识的首要质料是来自潜意识的、不遵从日常逻辑的意象。这些意象的生成可能类似西格蒙德·弗洛伊德所描述的核心梦工作机制：凝缩（Condensation，多个含义压缩为一个意象）、移置（Displacement，情感从真实对象转移到看似无关的意象上）、象征化（Symbolization，用具体符号表示无法被直接言说的意义）。意象之间的关联可能连你自己也无法用日常逻辑完全解释，但它们可能符合潜意识的直觉。</p>
<p>幻觉型创作触及的是那些日常逻辑和可辨识情感都无法抵达的深层，那些深藏于潜意识中，只有通过意象变形才能被间接触及的东西。它的潜在局限在于：作品与受众之间的沟通可能变得极为困难，因为意象的关联逻辑对受众而言可能是完全不透明的。</p>
<p>在视觉艺术中，超现实主义画家萨尔瓦多·达利《记忆的永恒》就是幻觉型创作的典范。在文学中，洛特雷阿蒙的散文诗《马尔多罗之歌》和威廉·巴勒斯的「剪切法」写作也可被归入这一类型。在电影中，大卫·林奇的《穆赫兰道》和《双峰》以梦的逻辑取代了因果律。需要指出，在《穆赫兰道》中，大卫·林奇对好莱坞权力结构的认知完全是成人式的，但表达方式却完全使用梦或幻觉的逻辑，这说明幻觉型创作也可以承载成人化的意识内容。</p>
<p>在摇滚创作中，吉姆·莫里森（The Doors）可以视为典型的幻觉型创作者，例如《Strange Days》中意象的生成模式更接近潜意识的工作机制，而词语的连接方式几乎完全打散了语法逻辑，甚至于缺乏稳定的解释框架。乔恩·安德森（Yes）在《Tales from Topographic Oceans》中表现出明显的幻觉型特征：意象之间的连接并不依赖现实因果，而是基于象征、联觉和梦境般的神秘体验。</p>`
},

"表达距离":{
"真诚":`<p>你习惯在作品中以自己的声音说话，不借助角色、面具或反语。表达声音与你的真实意图之间的距离趋近于零——你诉说的就是你意味的。这不意味着你的作品必然是简单或直白的：真诚型创作可以是极其复杂的，但它的复杂性往往源于你试图触及的事物本身。</p>
<p>真诚型创作的力度在于它剥离面具后裸露出来的声音本身。此时，语言承担的是一种近似见证或自白的功能，因此作品往往带有强烈的存在密度，要求读者直接面对经验本身。而它的潜在局限在于：某些东西可能确实无法被直接说出，它们太多面、太自我矛盾，以至于只有通过中介的迂回才能被更充分地表达。</p>
<p>在文学中，日本私小说可以视为一种高度真诚的文学体裁。作家通常直接以"我"的形式展开叙述，文学与现实经历之间的距离被刻意压缩，作品的力量来自一种未经过滤的主体声音。典型作家如志贺直哉、太宰治等，他们的许多文本几乎就是以文学形式展开的个人经验报告。在诗歌中，海子的诗（如《黑夜的献诗》）是复杂但真诚的典范，密集的意象和变化的语调使它们形式上绝不简单，但贯穿诗作的声音是始终不加掩饰的。保罗·策兰的诗歌同样如此：语言的碎裂和晦涩是面对不可言说之事时，语言本身需要承受压力的结果。</p>
<p>在摇滚创作中，伊恩·柯蒂斯（Joy Division）的歌词写作具有一种痛苦的自毁性，他总是以自己的声音诉说对现实的质问和怀疑，声音与意图之间几乎没有角色或叙事面具的中介。科特·柯本（Nirvana）的许多作品中也呈现出典型的真诚型特征，尽管他也会使用荒诞的意象。</p>`,

"迂回":`<p>你偏好通过某种中介层来接近自己真正想表达的东西。在你与作品之间存在一个可辨识的间距，可能是角色、面具、寓言、特定的叙事框架或形式装置等。这个间距是策略性的或必要性的，而非完全自由可操。</p>
<p>迂回型创作能表现那些必须借助中介才能被充分触及的东西。而它的潜在局限在于：如果中介层过于精巧或有趣，受众可能就滞留在面具的表面，不再继续穿过它，与创作者的真实意图间产生偏差。</p>
<p>与游离型的关键区别在于：穿过中介层之后，受众仍能感知到你的严肃性和某种（虽然可能仍是模糊的）真实意图。</p>
<p>费尔南多·佩索阿的异名写作是迂回型创作的经典案例——他为每个异名（如阿尔伯特·卡埃罗、阿尔瓦罗·德·坎波斯等）创造了独立的人格和风格，这些异名面具是他触及自身不同层面的必要中介。T·S·艾略特在《普鲁弗洛克的情歌》中借普鲁弗洛克之口说话，真实意图被模糊了，但读者仍能从中感受到其严肃性。伊塔罗·卡尔维诺的许多小说（如《如果在冬夜，一个旅人》、《马可瓦尔多》）则通过精巧的叙事框架或寓言结构来间接接近他真正关心的命题。</p>
<p>在摇滚创作中，大卫·鲍伊是迂回型创作的典范：Ziggy Stardust、Aladdin Sane、瘦白公爵，每个人格面具都是他试图触及以自身名义无从触及区域的中介。戴蒙·亚邦通过街头霸王乐队（Gorillaz）这一虚拟乐队形式同样建立了一个迂回的中介层，2D、默多克等虚构角色成为他在模糊乐队（Blur）的框架之外进行另一种创作的必要工具。</p>`,

"游离":`<p>你希望与作品之间保持着最大的间距。意义在你的作品中不被稳固锚定，能指与所指之间的对应关系松动乃至断裂，意义在符号链上持续滑动，接近拉康所述「漂浮的能指」概念。作品不是你的直接延伸，而成为了意义自由漂移的场域。形式本身可能是你首要关注的对象，它可能被夸张、扭曲、引用、戏仿，获得独立于内容的自我指涉性。在受众眼中，你的真实态度难以确定，而这种不确定性本身就是你作品的构成特征。</p>
<p>游离型创作的力度在于，当确定性被悬置时，某些在确定性框架内不可见的东西才会浮现。而它的代价是：受众可能永远无法抵达某个稳固的理解，它们必须接受在意义的漂流中寻找（或永远无法找到）自己的位置这一现实。</p>
<p>在视觉艺术中，安迪·沃霍尔就是典型的游离型创作者，他的丝网版画同时是对消费文化的参与和对它的讽刺，抑或二者皆非。在文学中，豪尔赫·路易斯·博尔赫斯的某些作品（如《特隆、乌克巴尔、奥尔比斯·忒蒂乌斯》）中，叙事的嵌套使得「谁在说话」变得不可确定；一些后现代小说家的作品，如托马斯·品钦的《万有引力之虹》同样栖居在这个位置。</p>
<p>在摇滚创作中，弗兰克·扎帕是一个游离型创作者，他的作品中充斥着对摇滚乐自身的戏仿、对高雅与低俗边界的消解、对听者试图确定他真实意图的持续挫败等。居民乐队（The Residents）的创作更为极端：匿名身份和荒诞形式使得说话者和其意图变得暧昧而不可知。卢·里德的游离性是通过一种持续的姿态暧昧实现的，在与沃霍尔合作时期他已经展现出这种品质：他似乎无意让受众确定自己的用意；噪音专辑《Metal Machine Music》至今悬在真诚的前卫实验、对唱片工业的蓄意破坏、和对听众期待的冷酷玩笑之间，作者本人还给出过自相矛盾的解释，这使任何确定的解法都滑向可疑。</p>`
},

"朝向":{
"内指":`<p>你的目光主要投向自己或人物的内在世界。意识的流动、情感的波动、记忆的重构、心理状态的变化是你创作的首要素材来源。外部世界即使出现在作品中，也主要是作为触发内在状态的刺激物或内在景观的投射存在。</p>
<p>需要指出，内指型不意味着自恋或与世隔绝。最好的内指型创作往往通过对自我经验的充分探索，往往能触及某种普遍性的人类处境，例如普鲁斯特对记忆的探索就揭示了记忆本身的结构。但内指型创作的也有局限：它可能难以充分处理那些自我之外的、需要从其本来面貌角度理解才能明晰的事物。</p>
<p>在文学中，普鲁斯特的《追忆似水年华》是内指型创作的典例，整部作品的真正素材是经叙事者的体验和意识重构后存在于记忆中的事物，外部世界中的每个细节都服务于对内在经验的深入探索。许多意识流小说都属于内指型作品，例如乔伊斯的《尤利西斯》、维吉尼亚·伍尔夫的《达洛维夫人》等。需要说明的是，尽管此类作品中可能存在第三人称叙述展开，但叙事的真正组织原则仍然是人物意识的流动本身而非外部世界的客观结构。</p>
<p>罗伯特·史密斯（The Cure）在《Faith》《Disintegration》等作品中是内指的：外部世界的衰败和阴郁在他的写作中始终是内在状态的外化。中性牛奶旅店乐队（Neutral Milk Hotel）《In the Aeroplane Over the Sea》的素材中虽有明确的外部指涉，但这些素材在他的写作中经历了彻底的内化变形。</p>`,

"外指":`<p>你的目光主要投向外部世界。社会结构、历史事件、政治现实、他人的生活或自然世界是你创作的首要素材来源。在你的作品中，自我往往会退居背景甚至消失。外部事物在作品中作为独立的、值得被直接观察和描绘的对象而存在，你试图遵从它们的本来面貌。</p>
<p>外指型创作的力量在于它对自我以外之世界的忠诚。它试图让事物以其自身的面貌被看见，而非被作者的内在状态所染色。它的潜在局限在于：如果自我退隐得过于彻底，作品有时可能会缺乏由内在参与所赋予的情感穿透力。</p>
<p>在文学中，巴尔扎克的《人间喜剧》以百科全书式的野心描绘了一个社会的全貌，托尔斯泰的《战争与和平》将目光投向历史进程和社会结构。在绘画中，古斯塔夫·库尔贝的现实主义画派则是外指型视觉创作的案例。</p>
<p>在摇滚创作中，鲍勃·迪伦在六十年代初的抗议民谣阶段是高度外指的，如《A Hard Rain's a-Gonna Fall》和《Masters of War》中的素材都来自对外部现实的观察和批判，他的自我倾向于退居到观察和报道的位置。一些典型的朋克乐队，如冲撞乐队（The Clash）同样是外指型创作者，他们的愤怒指向具体的社会结构和政治现实。马克·诺弗勒主导下的恐怖海峡乐队（Dire Straits）的素材朝向是典型外指，其音乐素材几乎完全由外部的结构性现实提供，象征着摇滚乐世界里的现实主义传统力量。</p>`,

"内指-外指均衡":`<p>你的创作素材在内在世界和外部世界之间保持相对均衡。你可能同时关注内在体验和外部结构，或者你在不同作品中自然地在两个方向间流动。</p>
<p>这种位置的优势在于它允许内在经验与外部观察之间建立连接。对自我的探索照亮了世界，而对世界的观察又反过来深化了你对自我的理解。二者彼此渗透，难以干净地分离。</p>
<p>在文学中，这种位置并不罕见。弗朗茨·卡夫卡就具有这种叠合态的典型特征，如《审判》的素材既包含对官僚体制这一外部结构的理解，也包含作者本人内在的存在焦虑，二者同等重要，抽去任何一方都会使作品坍塌。拉格奎斯特的《大盗巴拉巴》所呈现的是一种精神层面的内外指均衡：小说依托具体历史环境展开，在体现耶稣时代宗教信仰的同时，又始终围绕巴拉巴个人的精神困惑与存在孤独，两者互为支撑而不可分离。</p>
<p>在摇滚创作中，大卫·鲍伊的许多时期都可以被看作这种状态：外部世界的文化现象和内在的身份焦虑在他的作品中经常紧紧缠绕在一起。莫里西在史密斯乐队（The Smiths）的写作也经常同时朝两个方向运作，且两个方向都是实质性的，如《The Queen Is Dead》中，他对撒切尔时代英格兰的讽刺带有具体的指向和批判性，同时，孤立、欲望的落空、与世界的疏离等，在他的写作中也是独立成立的内在现实，而非社会批判的附产品。大卫·拜恩（Talking Heads）的《Remain the Light》既有对泛滥的消费文化与媒体语言的洞察，同时也在描写内部的身份错位、意识混乱与现代社会中无可避免的自我空洞，两者在歌词里几乎不可分离，共同构成了对于后结构主义式主体危机的注脚。</p>`
}
};

// Dimension display config
const DIM_CFG = [
    { key:"姿态", title:"维度一：姿态", axis:"作者 — 受众",
      subs:["高姿态","低姿态"], type:"bipolar" },
    { key:"心理年龄", title:"维度二：心理年龄", axis:"作者 — 真实世界",
      subs:["社会化（成人）","前社会化（孩童）","反社会化（青春期）"], type:"tripolar", sep:" / " },
    { key:"认知模式", title:"维度三：认知模式", axis:"作者 — 作品（质地）",
      subs:["思维","感觉","幻觉"], type:"tripolar", sep:"-" },
    { key:"表达距离", title:"维度四：表达距离", axis:"作者 — 作品（方式）",
      subs:["真诚","迂回","游离"], type:"tripolar", sep:"-" },
    { key:"朝向", title:"维度五：朝向", axis:"作者 — 素材",
      subs:["内指","外指"], type:"bipolar" }
];

const OPT_LABELS = ["完全不符合","比较不符合","不确定","比较符合","完全符合"];
const T = 12; // threshold

// ==================== SHUFFLE & RENDER ====================

function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

const indexed = Q.map((q, i) => ({...q, idx: i}));
const shuffled = shuffle(indexed);

const wrap = document.getElementById('qWrap');
shuffled.forEach((q, di) => {
    const div = document.createElement('div');
    div.className = 'question';
    div.id = 'q_' + q.idx;
    let opts = '';
    OPT_LABELS.forEach((lbl, oi) => {
        const v = oi + 1;
        opts += `<div class="opt">
            <input type="radio" id="r${q.idx}_${v}" name="r${q.idx}" value="${v}">
            <label for="r${q.idx}_${v}">${lbl}</label>
        </div>`;
    });
    div.innerHTML = `<div class="q-text"><span class="q-num">${di+1}.</span>${q.t}</div><div class="options">${opts}</div>`;
    wrap.appendChild(div);
});

// ==================== PROGRESS ====================

const form = document.getElementById('mainForm');
const progFill = document.getElementById('progFill');
const progCount = document.getElementById('progCount');
const total = Q.length;
progCount.style.display = 'block';

form.addEventListener('change', e => {
    const n = document.querySelectorAll('input[type=radio]:checked').length;
    progFill.style.width = (n / total * 100) + '%';
    progCount.textContent = n + ' / ' + total;
    if (e.target.type === 'radio') {
        const qd = e.target.closest('.question');
        if (qd) { qd.classList.add('answered'); qd.classList.remove('unanswered-highlight'); }
    }
});

// ==================== SUBMIT ====================

form.addEventListener('submit', e => {
    e.preventDefault();
    const n = document.querySelectorAll('input[type=radio]:checked').length;
    if (n < total) {
        const err = document.getElementById('errMsg');
        err.textContent = `请回答所有问题后再提交（已回答 ${n}/${total} 题）`;
        err.style.display = 'block';
        // find first unanswered
        for (const sq of shuffled) {
            if (!document.querySelector(`input[name="r${sq.idx}"]:checked`)) {
                const el = document.getElementById('q_' + sq.idx);
                if (el) { el.classList.add('unanswered-highlight'); el.scrollIntoView({behavior:'smooth',block:'center'}); }
                break;
            }
        }
        setTimeout(() => err.style.display = 'none', 4000);
        return;
    }

    // Gather raw scores
    const raw = {};
    Q.forEach((q, i) => {
        const v = +document.querySelector(`input[name="r${i}"]:checked`).value;
        if (!raw[q.d]) raw[q.d] = {};
        if (!raw[q.d][q.s]) raw[q.d][q.s] = {sum:0, cnt:0};
        raw[q.d][q.s].sum += v;
        raw[q.d][q.s].cnt++;
    });

    // Normalize
    const norm = {};
    for (const d in raw) {
        norm[d] = {};
        for (const s in raw[d]) {
            const {sum, cnt} = raw[d][s];
            norm[d][s] = Math.round(((sum - cnt) / (cnt * 4)) * 1000) / 10;
        }
    }

    // Determine labels
    const labels = {};

    // Bipolar: 姿态
    const hP = norm["姿态"]["高姿态"], lP = norm["姿态"]["低姿态"];
    if (hP > lP + T) labels["姿态"] = "高姿态";
    else if (lP > hP + T) labels["姿态"] = "低姿态";
    else labels["姿态"] = "中间姿态";

    // Bipolar: 朝向
    const iO = norm["朝向"]["内指"], oO = norm["朝向"]["外指"];
    if (iO > oO + T) labels["朝向"] = "内指";
    else if (oO > iO + T) labels["朝向"] = "外指";
    else labels["朝向"] = "内指-外指均衡";

    // Tripolar helper
    function tripolar(dim, sep) {
        const arr = DIM_CFG.find(c => c.key === dim).subs.map(s => ({name:s, score:norm[dim][s]}));
        arr.sort((a,b) => b.score - a.score);
        if (arr[0].score > arr[1].score + T) labels[dim] = arr[0].name;
        else labels[dim] = arr[0].name + sep + arr[1].name;
        return arr;
    }
    tripolar("心理年龄", " / ");
    tripolar("认知模式", "-");
    tripolar("表达距离", "-");

    showResults(norm, labels);
});

// ==================== RESULTS ====================

function showResults(norm, labels) {
    const res = document.getElementById('results');
    const summary = `${labels["姿态"]}·${labels["心理年龄"]}·${labels["认知模式"]}·${labels["表达距离"]}·${labels["朝向"]}`;

    let html = `<h2>你的创作人格</h2>
        <p class="results-subtitle">Creative Personality Profile</p>
        <div class="summary-box">${summary}</div>`;

    DIM_CFG.forEach(cfg => {
        const scores = cfg.subs.map(s => ({name:s, score:norm[cfg.key][s]}));
        scores.sort((a,b) => b.score - a.score);

        // Determine interpretation key
        let interpKey;
        if (cfg.type === 'bipolar') {
            interpKey = labels[cfg.key];
        } else {
            // tripolar: use highest scorer
            interpKey = scores[0].name;
        }

        let bars = '';
        scores.forEach((item, i) => {
            bars += `<div class="bar-row">
                <div class="bar-head">
                    <span class="bar-name">${item.name}</span>
                    <span class="bar-val">${item.score}%</span>
                </div>
                <div class="bar-track">
                    <div class="bar-fill-anim ${i > 0 ? 'sub' : ''}" data-w="${Math.max(item.score, 0)}%"></div>
                </div>
            </div>`;
        });

        const interpText = INTERP[cfg.key][interpKey] || '';

        html += `<div class="dim-block">
            <h3>${cfg.title}</h3>
            <div class="dim-axis">关系轴：${cfg.axis}</div>
            ${bars}
            <div class="interp">${interpText}</div>
        </div>`;
    });

    res.innerHTML = html;
    res.style.display = 'block';
    form.style.display = 'none';
    progFill.style.width = '100%';
    progCount.style.display = 'none';

    res.scrollIntoView({behavior:'smooth'});

    setTimeout(() => {
        document.querySelectorAll('.bar-fill-anim').forEach(b => {
            b.style.width = b.dataset.w;
        });
    }, 200);
}
</script>
